<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TrendSpy Report</title>
  <style>
    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f8f5ee 0%, #f1ebdf 100%);
      color: #14213d;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 64px 20px;
    }
    .card {
      background: rgba(255, 253, 247, 0.94);
      border: 1px solid #d8cdb8;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(20, 33, 61, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-family: Georgia, "Times New Roman", serif;
    }
    p {
      margin: 0;
      line-height: 1.7;
      color: #5c677d;
    }
    code {
      background: #f3ead9;
      padding: 2px 6px;
      border-radius: 999px;
      color: #8c4f25;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>TrendSpy Report</h1>
      <p>The GitHub Pages site has not been published yet. Run the <code>Publish Trends Site</code> workflow once, then refresh this page.</p>
    </section>
  </main>
</body>
</html>
