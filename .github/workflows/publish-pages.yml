name: Publish Trends Site

on:
  workflow_dispatch:
  schedule:
    - cron: "15 15 * * *"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      TRENDS_NOTIFICATION_METHOD: none
      PYTHONUNBUFFERED: "1"
      TRENDS_QUERY_MAX_ATTEMPTS: "2"
      TRENDS_QUOTA_RETRY_SECONDS: "30"
      TRENDS_EMPTY_RETRY_SECONDS: "10"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trends collection once
        run: python trends_monitor.py --test

      - name: Commit published site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No site changes to commit"
            exit 0
          fi
          git commit -m "chore: update trends site"
          git push
